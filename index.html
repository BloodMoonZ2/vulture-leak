<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FBI SECURE TERMINAL // ACCESS REQUIRED</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: monospace;
    overflow: hidden;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
}

input {
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px;
    margin: 5px;
    width: 250px;
    text-align: center;
}

button {
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px 20px;
    cursor: pointer;
}

button:hover {
    background: #00ff88;
    color: black;
}

.glitch {
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,100,0.05),
        rgba(255,0,0,0.05) 2px,
        transparent 4px
    );
    animation: flicker 0.15s infinite;
    pointer-events: none;
}

@keyframes flicker {
    0% {opacity: 0.9;}
    50% {opacity: 0.5;}
    100% {opacity: 1;}
}

.redrose {
    color: red;
    font-weight: bold;
    display: none;
}

.screen {
    display: none;
    padding: 40px;
}

.blink {
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% {opacity: 0;}
}

</style>
</head>
